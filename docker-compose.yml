services:
  backend:
    image: enterprise-copilot-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enterprise-copilot-backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      DATABASE_URL: sqlite+aiosqlite:///./data/app.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.3-70b-versatile}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3-turbo}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}

  frontend:
    image: enterprise-copilot-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enterprise-copilot-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
